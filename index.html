<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOS Manutenção - Orçamento Rápido</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <div class="header">
            <div id="logo-placeholder">⚡ SOS Manutenção</div>
            <p>Problemas elétricos ou hidráulicos? Receba um orçamento no WhatsApp em minutos.</p>
        </div>

        <div class="form-container">
            <form id="orcamentoForm">

                <div class="form-group">
                    <label>Qual é o problema atual?</label>
                    <div class="radio-group">
                        <label class="radio-option">
                            <input type="radio" name="servico" value="Chuveiro não esquenta / Queimou" required>
                            Chuveiro não esquenta / Queimou
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="servico" value="Problema no Aquecedor a Gás (Junker)">
                            Problema no Aquecedor a Gás (Junker)
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="servico" value="Disjuntor caindo / Tomada derretida">
                            Disjuntor caindo / Tomada derretida
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="servico" value="Outro problema elétrico ou hidráulico">
                            Outro problema (Descrever abaixo)
                        </label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="nome">Seu Nome</label>
                    <input type="text" id="nome" placeholder="Ex: João Silva" required>
                </div>

                <div class="form-group">
                    <label for="telefone">Seu WhatsApp / Telefone</label>
                    <input type="text" id="telefone" placeholder="Ex: (51) 981962819" required>
                </div>

                <div class="form-group">
                    <label for="endereco">Rua / Avenida</label>
                    <input type="text" id="endereco" placeholder="Ex: Rua dos Andradas" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="numero">Número</label>
                        <input type="text" id="numero" placeholder="123" required>
                    </div>

                    <div class="form-group">
                        <label for="complemento">Complemento</label>
                        <input type="text" id="complemento" placeholder="Ap 202">
                    </div>
                </div>

                <div class="form-group">
                    <label for="bairro">Bairro / Cidade</label>
                    <input type="text" id="bairro" placeholder="Ex: Nonoai - Porto Alegre" required>
                </div>

                <div class="form-group">
                    <label for="detalhes">Detalhes do problema</label>
                    <textarea id="detalhes"
                        placeholder="Ex: O disjuntor começou a cair depois que liguei o chuveiro..."></textarea>
                </div>

                <button type="submit" class="btn-submit">
                    💬 SOLICITAR ORÇAMENTO NO WHATSAPP
                </button>

            </form>
        </div>

        <div class="footer">
            Atendimento rápido • Orçamento sem compromisso
        </div>

    </div>

    <a href="https://wa.me/5551981962819" target="_blank" class="whatsapp-float">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
            <path
                d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.888-.788-1.487-1.761-1.663-2.06-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z" />

    </a>

    <script src="script.js"></script>
</body>

</html>
